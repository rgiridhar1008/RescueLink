spring.application.name=rescuelink-backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rescuelink?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:rescuelink_user}
spring.datasource.password=${DB_PASSWORD:Rescue@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

server.port=8080

# Email alert integration (configure via environment variables)
alert.mail.enabled=${ALERT_MAIL_ENABLED:false}
alert.mail.from=${ALERT_MAIL_FROM:no-reply@rescuelink.local}
alert.mail.recipients=${ALERT_MAIL_RECIPIENTS:2420030171@klh.edu.in}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
