services:
  db:
    image: mysql:8.4
    container_name: rescuelink-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rescuelink}
      MYSQL_USER: ${MYSQL_USER:-rescuelink_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_this_database_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_this_root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-rescuelink_user}", "-p${MYSQL_PASSWORD:-change_this_database_password}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend/rescuelink-backend
    container_name: rescuelink-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-rescuelink}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:-rescuelink_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-change_this_database_password}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost}
      ALERT_MAIL_ENABLED: ${ALERT_MAIL_ENABLED:-false}
      ALERT_MAIL_FROM: ${ALERT_MAIL_FROM:-no-reply@rescuelink.local}
      ALERT_MAIL_RECIPIENTS: ${ALERT_MAIL_RECIPIENTS:-alerts@example.com}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-true}
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend/rescuelink-ui
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-/api}
    container_name: rescuelink-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mysql_data:
